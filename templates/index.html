<!DOCTYPE html>
    </div>
</div>

<div class="grid">
    <div class="card"><canvas id="lineChart"></canvas></div>
    <div class="card"><canvas id="pieChart"></canvas></div>
</div>

</div>

<!-- ===== ページ2（商品一覧） ===== -->
<div id="page2" class="page">

<div class="products">
{% for p in table_data %}
<div class="product-card">
<h3>{{ p.name }}</h3>
<p>💰 {{ p.price }}円</p>
<p>📦 在庫 {{ p.stock }}</p>
<p>📈 売上 {{ p.total }}</p>
<a href="/sell/{{ p.id }}" class="btn">売る</a>
<a href="/delete/{{ p.id }}" class="btn delete">削除</a>
</div>
{% endfor %}
</div>

</div>

</div>

<!-- ===== 下固定ナビ ===== -->
<div class="bottom-nav">
<button onclick="showPage(1)">📊</button>
<button onclick="showPage(2)">📦</button>
</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

// ===== ページ切替 =====
function showPage(n){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page'+n).classList.add('active');
}

// ===== グラフ（プロ仕様） =====
new Chart(lineChart, {
    type: "line",
    data: {
        labels: dates,
        datasets: [{
            data: dailySales,
            borderColor: "#4f46e5",
            backgroundColor: "rgba(79,70,229,0.2)",
            fill: true,
            tension: 0.4,
            borderWidth: 3
        }]
    },
    options: {
        plugins: { legend: { display: false } },
        scales: {
            x: { grid: { display: false } },
            y: { grid: { color: "rgba(0,0,0,0.1)" } }
        }
    }
});

new Chart(pieChart,{
    type:"pie",
    data:{labels:pieLabels,datasets:[{data:pieData}]}
});
</script>

</body>
</html>
