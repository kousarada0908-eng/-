<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>商品管理アプリ</title>

<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="header">
    商品管理アプリ
</div>

<div class="top-bar">
    <div>売上合計: ¥{{ total_sales }}</div>
    <a href="/add" class="btn">＋ 商品追加</a>
</div>

<div class="container">
    {% for p in products %}
    <div class="card">

        {% if p.image %}
        <img src="/static/uploads/{{ p.image }}">
        {% else %}
        <img src="https://via.placeholder.com/200x150">
        {% endif %}

        <div class="card-body">
            <h3>{{ p.name }}</h3>
            <p>¥{{ p.price }}</p>
            <p>在庫: {{ p.stock }}</p>

            <a href="/sell/{{ loop.index0 }}" class="btn">売る</a>
        </div>

    </div>
    {% endfor %}
</div>

</body>
</html>
