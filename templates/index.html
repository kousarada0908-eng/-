<!DOCTYPE html>
</div>
</div>

<!-- ===== ページ2 ===== -->
<div id="page2" class="page">

<!-- 追加フォーム復活 -->
<div class="card">
<form action="/add" method="POST">
<input name="name" placeholder="商品名">
<input name="price" placeholder="価格">
<input name="stock" placeholder="在庫">
<input name="image" placeholder="画像URL">
<button>追加</button>
</form>

<label>
<input type="checkbox" id="notifyToggle" checked> 通知ON
</label>
</div>

<div class="products">
{% for p in table_data %}
<div class="product-card">
<img src="{{ p.image if p.image else 'https://via.placeholder.com/150' }}">
<h3>{{ p.name }}</h3>
<p>{{ p.price }}円</p>
<p>在庫 {{ p.stock }}</p>
<p>売上 {{ p.total }}</p>

<button onclick="sellProduct({{ p.id }})">売る</button>
<a href="/delete/{{ p.id }}">削除</a>
</div>
{% endfor %}
</div>
</div>

<div class="bottom-nav">
<button onclick="showPage(1)">📊</button>
<button onclick="showPage(2)">📦</button>
</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let chart;

function toggleDark(){document.body.classList.toggle("dark");}

function showPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");
}

// グラデーション
function createGradient(ctx){
let grad = ctx.createLinearGradient(0,0,0,300);
grad.addColorStop(0,"rgba(79,70,229,0.5)");
grad.addColorStop(1,"rgba(79,70,229,0)");
return grad;
}

function createChart(){
if(chart) chart.destroy();
let ctx = document.getElementById("lineChart").getContext("2d");
chart = new Chart(ctx,{
 type:"line",
 data:{labels:dates,datasets:[{data:dailySales,borderColor:"#4f46e5",backgroundColor:createGradient(ctx),fill:true,tension:0.4}]}
});
}
createChart();

new Chart(pieChart,{type:"pie",data:{labels:pieLabels,datasets:[{data:pieData}]},options:{responsive:true,maintainAspectRatio:false}});

// 売る＋通知
function sellProduct(id){
fetch("/sell/"+id).then(()=>{
if(document.getElementById("notifyToggle").checked){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1500);
}
location.reload();
});
}
</script>

</body>
</html>
