<h2>📊 ダッシュボード</h2>

<form action="/add" method="POST">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <button type="submit">追加</button>
</form>

<hr>

<h3>📈 日別売上</h3>

<button onclick="showTotal()">日別合計</button>
<button onclick="showProduct()">商品別</button>

<select id="unitSelect">
    <option value="100">100円単位</option>
    <option value="1000">1000円単位</option>
    <option value="10000">10000円単位</option>
</select>

<canvas id="lineChart"></canvas>

<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const productDaily = {{ product_daily | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let lineChart;
let mode = "total";

function createChart(unit) {

    if (lineChart) lineChart.destroy();

    let datasets = [];
    let allValues = [];

    if (mode === "total") {
        const converted = dailySales.map(v => v / unit);
        allValues = converted;

        datasets.push({
            label: `日別売上（${unit}円単位）`,
            data: converted,
            tension: 0.3
        });

    } else {
        Object.keys(productDaily).forEach(name => {
            const converted = productDaily[name].map(v => v / unit);
            allValues = allValues.concat(converted);

            datasets.push({
                label: name,
                data: converted,
                tension: 0.3
            });
        });
    }

    const maxValue = Math.max(...allValues);
    const suggestedMax = maxValue * 2;

    lineChart = new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
            labels: dates,
            datasets: datasets
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: suggestedMax
                }
            }
        }
    });
}

function showTotal() {
    mode = "total";
    createChart(Number(document.getElementById("unitSelect").value));
}

function showProduct() {
    mode = "product";
    createChart(Number(document.getElementById("unitSelect").value));
}

document.getElementById("unitSelect").addEventListener("change", function() {
    createChart(Number(this.value));
});

createChart(100);

// 円グラフ
const colors = pieLabels.map((_, i) =>
    `hsl(${i * 60}, 70%, 60%)`
);

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: pieLabels,
        datasets: [{
            data: pieData,
            backgroundColor: colors
        }]
    }
});
</script>

<hr>

<h3>商品一覧</h3>

<table border="1">
<tr>
    <th>商品名</th>
    <th>単価</th>
    <th>在庫</th>
    <th>売れた数</th>
    <th>売上</th>
    <th>操作</th>
</tr>

{% for p in table_data %}
<tr>
    <td>{{ p.name }}</td>
    <td>{{ p.price }}</td>
    <td>{{ p.stock }}</td>
    <td>{{ p.sold }}</td>
    <td>{{ p.total }}</td>
    <td>
        <a href="/sell/{{ p.id }}">売る</a>
        <a href="/delete/{{ p.id }}">削除</a>
    </td>
</tr>
{% endfor %}

<tr>
    <td colspan="4"><b>合計売上</b></td>
    <td colspan="2"><b>{{ total_sum }}</b></td>
</tr>

</table>
