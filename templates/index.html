<h2>商品管理</h2>

<form action="/add" method="POST" enctype="multipart/form-data">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <input type="file" name="image">
    <button type="submit">追加</button>
</form>

<hr>

<canvas id="chart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const names = {{ names | tojson }};
const sold = {{ sold_data | tojson }};

new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
        labels: names,
        datasets: [{
            label: "売れた数",
            data: sold
        }]
    }
});
</script>

<hr>

{% for p in table_data %}
    <div>
        <h3>{{ p.name }}</h3>
        <p>価格: {{ p.price }}</p>
        <p>売れた数: {{ p.sold }}</p>
        <p>在庫: {{ p.stock }}</p>
        <p>売上: {{ p.total }}</p>

        {% if p.image %}
            <img src="/static/images/{{ p.image }}" width="120">
        {% endif %}

        <br>
        <a href="/sell/{{ p.id }}">売る</a>
        <a href="/delete/{{ p.id }}">削除</a>
    </div>
    <hr>
{% endfor %}
