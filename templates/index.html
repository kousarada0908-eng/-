<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: #1a1a1a;
    --main: #4f46e5;
    --sub: #06b6d4;
}

.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
}

body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg), #e2e8f0);
    color: var(--text);
    font-family: 'Segoe UI', sans-serif;
}

.header {
    background: linear-gradient(135deg, #1e293b, #0f172a);
    color: white;
    padding: 18px;
    text-align: center;
    position: sticky;
    top: 0;
}

.logout {
    position: absolute;
    right: 15px;
    top: 15px;
    text-decoration: none;
    color: white;
    background: rgba(255,255,255,0.1);
    padding: 6px 10px;
    border-radius: 8px;
}

.container {
    padding: 20px;
    max-width: 1200px;
    margin: auto;
}

.card {
    background: var(--card);
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

button {
    padding: 10px 16px;
    margin: 5px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--main), var(--sub));
    color: white;
    font-weight: bold;
    cursor: pointer;
}

input, select {
    padding: 10px;
    margin: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #333;
    color: white;
}

td, th {
    padding: 8px;
}

tr:nth-child(even) {
    background: #eee;
}

.dark tr:nth-child(even) {
    background: #444;
}

@media(max-width:600px){
    button { width: 100%; }
    table, tr, td { display:block; }
}
</style>
</head>

<body>

<div class="header">
📊 ダッシュボード
<a href="/logout" class="logout">ログアウト</a>
</div>

<div class="container">

<button onclick="toggleDark()">🌙 ダークモード</button>

<div class="card">
<form action="/add" method="POST">
<input name="name" placeholder="商品名">
<input name="price" placeholder="価格">
<input name="stock" placeholder="在庫">
<button>追加</button>
</form>
</div>

<div class="card">
<h3>📈 売上</h3>

<button onclick="showTotal()">合計</button>
<button onclick="showProduct()">商品別</button>

<select id="unitSelect">
<option value="100">100円</option>
<option value="1000">1000円</option>
<option value="10000">10000円</option>
</select>

<select id="modeSelect" onchange="changeMode()">
<option value="day">日別</option>
<option value="week">週別</option>
<option value="month">月別</option>
</select>

<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h3>商品一覧</h3>

<button onclick="sortTable('total')">売上順</button>
<button onclick="sortTable('stock')">在庫順</button>

<table id="productTable">
<tr><th>商品名</th><th>単価</th><th>在庫</th><th>売上</th></tr>

{% for p in table_data %}
<tr class="data-row">
<td>{{ p.name }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td>{{ p.total }}</td>
</tr>
{% endfor %}
</table>
</div>

<div class="card">
<h3>🏆 ランキング</h3>
<ol>
{% for r in ranking %}
<li>{{ r.name }} - {{ r.total }}円</li>
{% endfor %}
</ol>
</div>

</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let chart;

// ダークモード
function toggleDark(){
    document.body.classList.toggle("dark");
}

// ===== 折れ線グラフ（改良版） =====
function createChart(){
    if(chart) chart.destroy();

    chart = new Chart(lineChart, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                label: "売上",
                data: dailySales,
                borderColor: "#4f46e5",
                backgroundColor: "rgba(79,70,229,0.2)",
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointRadius: 3
            }]
        },
        options: {
            responsive: true,
            animation: {
                duration: 1500
            },
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                x: {
                    grid: { display: false }
                },
                y: {
                    grid: { color: "rgba(0,0,0,0.1)" }
                }
            }
        }
    });
}

createChart();

// 円グラフ
new Chart(pieChart,{
    type:"pie",
    data:{labels:pieLabels,datasets:[{data:pieData}]},
    options:{animation:{duration:1500}}
});

// 並び替え
function sortTable(type){
    const rows=[...document.querySelectorAll(".data-row")];
    const i = type==="stock"?2:3;

    rows.sort((a,b)=>b.children[i].innerText - a.children[i].innerText);
    rows.forEach(r=>productTable.appendChild(r));
}
</script>

</body>
</html>
