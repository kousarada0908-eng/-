<h2>📊 ダッシュボード</h2>

<form action="/add" method="POST">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <button type="submit">追加</button>
</form>

<hr>

<h3>日別売上</h3>
<canvas id="lineChart"></canvas>

<h3>商品別売れた数</h3>
<canvas id="pieChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const names = {{ names | tojson }};
const soldCounts = {{ sold_counts | tojson }};

// 折れ線
new Chart(document.getElementById("lineChart"), {
    type: "line",
    data: {
        labels: dates,
        datasets: [{
            label: "売上",
            data: dailySales
        }]
    }
});

// 円グラフ
new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: names,
        datasets: [{
            data: soldCounts
        }]
    }
});
</script>

<hr>

<h3>商品一覧</h3>

<table border="1">
<tr>
    <th>商品名</th>
    <th>単価</th>
    <th>在庫</th>
    <th>売れた数</th>
    <th>売上</th>
    <th>操作</th>
</tr>

{% for p in table_data %}
<tr>
    <td>{{ p.name }}</td>
    <td>{{ p.price }}</td>
    <td>{{ p.stock }}</td>
    <td>{{ p.sold }}</td>
    <td>{{ p.total }}</td>
    <td>
        <a href="/sell/{{ p.id }}">売る</a>
        <a href="/delete/{{ p.id }}">削除</a>
    </td>
</tr>
{% endfor %}

<tr>
    <td colspan="4"><b>合計売上</b></td>
    <td colspan="2"><b>{{ total_sum }}</b></td>
</tr>

</table>
