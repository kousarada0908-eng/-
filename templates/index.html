<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>商品管理アプリ</title>

<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="header">
    商品管理アプリ
</div>

<div class="top-bar">
    <a href="/logout" class="btn delete">ログアウト</a>
</div>

<!-- グラフ -->
<div style="padding:20px; text-align:center;">
    <canvas id="salesChart" style="max-width:600px;"></canvas>
</div>

<!-- 商品追加 -->
<div class="form-container">
<form method="POST" action="/add">
    <input type="text" name="name" placeholder="商品名" required>
    <input type="number" name="price" placeholder="価格" required>
    <input type="number" name="stock" placeholder="在庫" required>
    <button type="submit" class="btn">追加</button>
</form>
</div>

<!-- 商品一覧 -->
<div class="container">
    {% for p in products %}
    <div class="card">

        <div class="card-body">
            <h3>{{ p.name }}</h3>
            <p>¥{{ p.price }}</p>
            <p>在庫: {{ p.stock }}</p>

            <a href="/sell/{{ p.id }}" class="btn">売る</a>
            <a href="/delete/{{ p.id }}" class="btn delete">削除</a>
        </div>

    </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = JSON.parse('{{ names | tojson | safe }}');
const data = JSON.parse('{{ sales | tojson | safe }}');

new Chart(document.getElementById('salesChart'), {
    type: 'pie',
    data: {
        labels: labels,
        datasets: [{
            data: data
        }]
    }
});
</script>

</body>
</html>
