<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>商品管理</title>

<style>
body {
    font-family: sans-serif;
    background: #f5f5f5;
    margin: 0;
}

.header {
    background: #333;
    color: white;
    padding: 15px;
    font-size: 20px;
}

.container {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

.card {
    background: white;
    width: 200px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-body {
    padding: 10px;
}

.btn {
    display: block;
    text-align: center;
    padding: 8px;
    margin-top: 10px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

.btn:hover {
    background: #0056b3;
}
</style>
</head>

<body>

<div class="header">
    商品管理アプリ
</div>

<div style="padding: 10px;">
    売上合計: ¥{{ total_sales }}
    <br>
    <a href="/add" class="btn">＋ 商品追加</a>
</div>

<div class="container">
    {% for p in products %}
    <div class="card">

        {% if p.image %}
        <img src="/static/uploads/{{ p.image }}">
        {% endif %}

        <div class="card-body">
            <h3>{{ p.name }}</h3>
            <p>¥{{ p.price }}</p>
            <p>在庫: {{ p.stock }}</p>

            <a href="/sell/{{ loop.index0 }}" class="btn">売る</a>
        </div>

    </div>
    {% endfor %}
</div>

</body>
</html>
