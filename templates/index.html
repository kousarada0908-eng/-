<html lang="ja">

<!-- メイン -->
<div class="main">

<!-- KPI -->
<div class="kpi">
    <div class="kpi-card">
        <h3>総売上</h3>
        <p>{{ total_sum }}円</p>
    </div>
    <div class="kpi-card">
        <h3>商品数</h3>
        <p>{{ table_data|length }}</p>
    </div>
</div>

<!-- 追加ボタン -->
<button onclick="openModal()">＋ 商品追加</button>

<!-- グラフ -->
<div class="grid">
    <div class="card"><canvas id="lineChart"></canvas></div>
    <div class="card"><canvas id="pieChart"></canvas></div>
</div>

<!-- テーブル -->
<div class="card">
<table>
<tr><th>商品名</th><th>価格</th><th>在庫</th><th>売上</th></tr>
{% for p in table_data %}
<tr>
<td>{{ p.name }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td>{{ p.total }}</td>
</tr>
{% endfor %}
</table>
</div>

</div>
</div>

<!-- モーダル -->
<div class="modal" id="modal">
<div class="modal-content">
<h3>商品追加</h3>
<form action="/add" method="POST">
<input name="name" placeholder="商品名"><br>
<input name="price" placeholder="価格"><br>
<input name="stock" placeholder="在庫"><br>
<button>追加</button>
</form>
<button onclick="closeModal()">閉じる</button>
</div>
</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

new Chart(lineChart, {
    type: "line",
    data: {
        labels: dates,
        datasets: [{
            data: dailySales,
            borderColor: "#4f46e5",
            backgroundColor: "rgba(79,70,229,0.2)",
            fill: true,
            tension: 0.4
        }]
    }
});

new Chart(pieChart,{
    type:"pie",
    data:{labels:pieLabels,datasets:[{data:pieData}]}
});

function openModal(){
    modal.style.display = "flex";
}
function closeModal(){
    modal.style.display = "none";
}
</script>

</body>
</html>
