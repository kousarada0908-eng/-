<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: sans-serif;
    background: #f4f6f9;
    margin: 0;
}

/* ヘッダー */
.header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

/* コンテナ */
.container {
    padding: 15px;
}

/* カードUI */
.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* グリッド（スマホ対応） */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
}

@media(min-width: 768px) {
    .grid {
        grid-template-columns: 1fr 1fr;
    }
}

/* ボタン */
button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    background: #3498db;
    color: white;
}

/* テーブル */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #333;
    color: white;
}

td, th {
    padding: 8px;
    text-align: center;
}

tr:nth-child(even) {
    background: #f9f9f9;
}

tr:hover {
    background: #ffeeba;
}

/* スマホ用 */
@media(max-width:600px){
    table, thead, tbody, th, td, tr {
        display: block;
    }

    tr {
        margin-bottom: 10px;
        background: white;
        border-radius: 10px;
        padding: 10px;
    }

    th {
        display: none;
    }

    td {
        text-align: left;
    }
}
</style>
</head>

<body>

<div class="header">📊 売上ダッシュボード</div>

<div class="container">

<!-- 商品追加 -->
<div class="card">
<form action="/add" method="POST">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <button type="submit">追加</button>
</form>
</div>

<!-- グラフ -->
<div class="card">
<h3>📈 売上グラフ</h3>

<button onclick="showTotal()">合計</button>
<button onclick="showProduct()">商品別</button>

<select id="unitSelect">
<option value="100">100円</option>
<option value="1000">1000円</option>
<option value="10000">10000円</option>
</select>

<select id="modeSelect" onchange="changeMode()">
<option value="day">日別</option>
<option value="week">週別</option>
<option value="month">月別</option>
</select>

<a href="/download">CSV</a>

<canvas id="lineChart"></canvas>
</div>

<!-- 円グラフ -->
<div class="card">
<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>
</div>

<!-- 商品一覧 -->
<div class="card">
<h3>商品一覧</h3>

<button onclick="sortTable('total')">売上順</button>
<button onclick="sortTable('stock')">在庫順</button>
<button onclick="sortTable('sold')">販売数順</button>

<table id="productTable">
<tr>
<th>商品名</th><th>単価</th><th>在庫</th><th>売れた</th><th>売上</th><th>操作</th>
</tr>

{% for p in table_data %}
<tr class="data-row">
<td>{{ p.name }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td>{{ p.sold }}</td>
<td>{{ p.total }}</td>
<td>
<a href="/sell/{{ p.id }}">売る</a>
<a href="/delete/{{ p.id }}">削除</a>
</td>
</tr>
{% endfor %}
</table>

</div>

<!-- ランキング -->
<div class="card">
<h3>🏆 ランキング</h3>
<ol>
{% for r in ranking %}
<li>{{ r.name }} - {{ r.total }}円</li>
{% endfor %}
</ol>
</div>

</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const productDaily = {{ product_daily | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let chart;
let mode = "total";

function getColor(i){
    return `hsl(${i*60},70%,50%)`;
}

function createChart(unit){
    if(chart) chart.destroy();

    let datasets=[];
    let all=[];

    if(mode==="total"){
        const d = dailySales.map(v=>v/unit);
        all=d;
        datasets.push({label:"合計",data:d,borderColor:"blue"});
    }else{
        Object.keys(productDaily).forEach((n,i)=>{
            const d=productDaily[n].map(v=>v/unit);
            all=all.concat(d);
            datasets.push({label:n,data:d,borderColor:getColor(i)});
        });
    }

    chart=new Chart(lineChart,{
        type:"line",
        data:{labels:dates,datasets:datasets},
        options:{scales:{y:{suggestedMax:Math.max(...all)*2}}}
    });
}

function showTotal(){mode="total";createChart(100);}
function showProduct(){mode="product";createChart(100);}

function changeMode(){
    location.href="/?mode="+modeSelect.value;
}

createChart(100);

new Chart(pieChart,{
    type:"pie",
    data:{labels:pieLabels,datasets:[{data:pieData}]}
});

function sortTable(type){
    const rows=[...document.querySelectorAll(".data-row")];
    const i={stock:2,sold:3,total:4}[type];

    rows.sort((a,b)=>b.children[i].innerText - a.children[i].innerText);
    rows.forEach(r=>productTable.appendChild(r));
}
</script>

</body>
</html>
