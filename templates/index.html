<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>商品管理アプリ</title>

<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="header">
    商品管理アプリ
</div>

<div class="top-bar">
    <div>売上合計: ¥{{ total_sales }}</div>
    <a href="/add" class="btn">＋ 商品追加</a>
</div>

<!-- グラフ -->
<div style="padding:20px; text-align:center;">
    <canvas id="salesChart" style="max-width:800px; margin:auto;"></canvas>
</div>

<div class="container">
    {% for p in products %}
    <div class="card">

        {% if p.image %}
        <img src="/static/uploads/{{ p.image }}">
        {% else %}
        <img src="https://via.placeholder.com/200x150">
        {% endif %}

        <div class="card-body">
            <h3>{{ p.name }}</h3>
            <p>¥{{ p.price }}</p>
            <p>在庫: {{ p.stock }}</p>

            <a href="/sell/{{ loop.index0 }}" class="btn">売る</a>
            <a href="/delete/{{ loop.index0 }}" class="btn delete">削除</a>
        </div>

    </div>
    {% endfor %}
</div>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- グラフ描画 -->
<script>
const labels = JSON.parse('{{ names | tojson | safe }}');
const data = JSON.parse('{{ sales | tojson | safe }}');

const ctx = document.getElementById('salesChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: '販売数',
            data: data,
            backgroundColor: 'rgba(0, 123, 255, 0.7)',
            borderRadius: 8
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: {
                display: false
            },
            title: {
                display: true,
                text: '商品ごとの販売数',
                font: {
                    size: 18
                }
            }
        },
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 1
                }
            }
        }
    }
});
</script>

</body>
</html>
