<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ダッシュボード</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<div class="container">

  <h1>売上ダッシュボード</h1>

  <!-- ✅ Flask → JSデータ受け渡し（ここだけJinja OK） -->
 <script>
  window.dashboardData = JSON.parse('{{ {
    "names": names,
    "sold": sold_data,
    "dates": dates,
    "daily": daily_sales,
    "total": total_sum
  } | tojson | safe }}');
</script>


  <div class="card">
    <h2>商品別売上</h2>
    <canvas id="productChart"></canvas>
  </div>

  <div class="card">
    <h2>日別売上</h2>
    <canvas id="dailyChart"></canvas>
  </div>

</div>

<!-- 外部JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
