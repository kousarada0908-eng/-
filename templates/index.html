<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="header">
📊 ダッシュボード
<a href="/logout" class="logout">ログアウト</a>
</div>

<div class="container">

<button onclick="toggleDark()">🌙 ダークモード</button>

<div class="card">
<form action="/add" method="POST">
<input name="name" placeholder="商品名">
<input name="price" placeholder="価格">
<input name="stock" placeholder="在庫">
<button>追加</button>
</form>
</div>

<div class="card">
<h3>📈 売上</h3>

<button onclick="showTotal()">合計</button>
<button onclick="showProduct()">商品別</button>

<select id="unitSelect">
<option value="100">100円</option>
<option value="1000">1000円</option>
<option value="10000">10000円</option>
</select>

<select id="modeSelect" onchange="changeMode()">
<option value="day">日別</option>
<option value="week">週別</option>
<option value="month">月別</option>
</select>

<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>
</div>

<div class="card">
<h3>商品一覧</h3>

<button onclick="sortTable('total')">売上順</button>
<button onclick="sortTable('stock')">在庫順</button>

<table id="productTable">
<tr><th>商品名</th><th>単価</th><th>在庫</th><th>売上</th></tr>

{% for p in table_data %}
<tr class="data-row">
<td>{{ p.name }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td>{{ p.total }}</td>
</tr>
{% endfor %}
</table>
</div>

<div class="card">
<h3>🏆 ランキング</h3>
<ol>
{% for r in ranking %}
<li>{{ r.name }} - {{ r.total }}円</li>
{% endfor %}
</ol>
</div>

</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let chart;

// ダークモード
function toggleDark(){
    document.body.classList.toggle("dark");
}

// ===== 折れ線グラフ（改良版） =====
function createChart(){
    if(chart) chart.destroy();

    chart = new Chart(lineChart, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                label: "売上",
                data: dailySales,
                borderColor: "#4f46e5",
                backgroundColor: "rgba(79,70,229,0.2)",
                fill: true,
                tension: 0.4,
                borderWidth: 3,
                pointRadius: 3
            }]
        },
        options: {
            responsive: true,
            animation: {
                duration: 1500
            },
            plugins: {
                legend: {
                    display: false
                }
            },
            scales: {
                x: {
                    grid: { display: false }
                },
                y: {
                    grid: { color: "rgba(0,0,0,0.1)" }
                }
            }
        }
    });
}

createChart();

// 円グラフ
new Chart(pieChart,{
    type:"pie",
    data:{labels:pieLabels,datasets:[{data:pieData}]},
    options:{animation:{duration:1500}}
});

// 並び替え
function sortTable(type){
    const rows=[...document.querySelectorAll(".data-row")];
    const i = type==="stock"?2:3;

    rows.sort((a,b)=>b.children[i].innerText - a.children[i].innerText);
    rows.forEach(r=>productTable.appendChild(r));
}
</script>

</body>
</html>
