<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg:#f4f6f9;
    --card:white;
    --text:#1a1a1a;
    --main:#4f46e5;
    --sub:#06b6d4;
}

.dark {
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e2e8f0;
}

body {
    margin:0;
    background:linear-gradient(135deg,var(--bg),#e2e8f0);
    color:var(--text);
    font-family:sans-serif;
}

/* ===== pages ===== */
.page{display:none;}
.active{display:block;}

/* ===== KPI ===== */
.kpi{display:flex;gap:10px;padding:10px;}
.kpi-card{flex:1;padding:15px;border-radius:10px;color:white;}
.kpi-blue{background:#4f46e5;}
.kpi-green{background:#10b981;}

/* ===== cards ===== */
.card{
    background:var(--card);
    margin:10px;
    padding:10px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* ===== grid ===== */
.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

/* ===== products ===== */
.products{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.product-card{
    background:var(--card);
    padding:10px;
    border-radius:10px;
}

.product-card img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
}

/* ===== buttons ===== */
button,.btn{
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,var(--main),var(--sub));
    color:white;
    cursor:pointer;
    display:inline-block;
    margin-top:5px;
}

.delete{background:red;}

/* ===== bottom nav ===== */
.bottom-nav{
    position:fixed;
    bottom:0;
    width:100%;
    background:#0f172a;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

.bottom-nav button{
    background:none;
    color:white;
    font-size:18px;
}

/* ===== toast ===== */
.toast{
    position:fixed;
    top:20px;
    right:20px;
    background:#333;
    color:white;
    padding:10px;
    border-radius:8px;
    display:none;
}

/* ===== canvas ===== */
canvas{
    width:100%!important;
    height:300px!important;
}

/* ===== mobile ===== */
@media(max-width:600px){
    .grid{grid-template-columns:1fr;}
    .kpi{flex-direction:column;}
}
</style>
</head>

<body>

<div id="toast" class="toast">売れました！</div>

<button onclick="toggleDark()">🌙</button>

<!-- ================= PAGE 1 ================= -->
<div id="page1" class="page active">

<div class="kpi">
    <div class="kpi-card kpi-blue">
        <h3>総売上</h3>
        <p>{{ total_sum }}円</p>
    </div>
    <div class="kpi-card kpi-green">
        <h3>商品数</h3>
        <p>{{ table_data|length }}</p>
    </div>
</div>

<div class="grid">
    <div class="card"><canvas id="lineChart"></canvas></div>
    <div class="card"><canvas id="pieChart"></canvas></div>
</div>

</div>

<!-- ================= PAGE 2 ================= -->
<div id="page2" class="page">

<!-- 商品追加 -->
<div class="card">

<form action="/add" method="POST" enctype="multipart/form-data">
<input name="name" placeholder="商品名">
<input name="price" placeholder="価格">
<input name="stock" placeholder="在庫">
<input type="file" name="images" multiple>
<button>追加</button>
</form>

<!-- 通知設定 -->
<form action="/set_notify" method="POST">
<select name="notify_type">
<option value="all">全部通知</option>
<option value="sell">売上のみ</option>
<option value="none">OFF</option>
</select>
<button>保存</button>
</form>

</div>

<!-- 商品一覧 -->
<div class="products">

{% for p in table_data %}
<div class="product-card">

<!-- 画像（最大5枚） -->
{% for img in p.images %}
<img src="/{{ img }}">
{% endfor %}

<h3>{{ p.name }}</h3>
<p>💰 {{ p.price }}円</p>
<p>📦 在庫 {{ p.stock }}</p>
<p>📈 売上 {{ p.total }}</p>

<button onclick="sellProduct({{ p.id }})">売る</button>
<a href="/delete/{{ p.id }}" class="btn delete">削除</a>

</div>
{% endfor %}

</div>

</div>

<!-- ================= NAV ================= -->
<div class="bottom-nav">
<button onclick="showPage(1)">📊</button>
<button onclick="showPage(2)">📦</button>
</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

function toggleDark(){
    document.body.classList.toggle("dark");
}

function showPage(n){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("page"+n).classList.add("active");
}

// ===== グラデーション付きライン =====
function createGradient(ctx){
    let g = ctx.createLinearGradient(0,0,0,300);
    g.addColorStop(0,"rgba(79,70,229,0.5)");
    g.addColorStop(1,"rgba(79,70,229,0)");
    return g;
}

let chart;

function createChart(){
    if(chart) chart.destroy();

    let ctx = document.getElementById("lineChart").getContext("2d");

    chart = new Chart(ctx,{
        type:"line",
        data:{
            labels:dates,
            datasets:[{
                data:dailySales,
                borderColor:"#4f46e5",
                backgroundColor:createGradient(ctx),
                fill:true,
                tension:0.4
            }]
        }
    });
}
createChart();

// ===== 円グラフ（見切れ防止） =====
new Chart(document.getElementById("pieChart"),{
    type:"pie",
    data:{
        labels:pieLabels,
        datasets:[{data:pieData}]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false
    }
});

// ===== 売る =====
function sellProduct(id){
    fetch("/sell/"+id).then(()=>{
        let t=document.getElementById("toast");
        t.style.display="block";
        setTimeout(()=>t.style.display="none",1500);
        location.reload();
    });
}
</script>

</body>
</html>
