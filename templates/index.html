<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>商品管理アプリ</title>

<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="header">
    商品管理アプリ
</div>

<div class="top-bar">
    <div>売上合計: ¥{{ total_sales }}</div>
    <a href="/add" class="btn">＋ 商品追加</a>
</div>

<!-- 目盛り切替 -->
<div style="text-align:center; margin:20px;">
    <button onclick="updateStep(1)">1</button>
    <button onclick="updateStep(5)">5</button>
    <button onclick="updateStep(10)">10</button>
</div>

<!-- グラフ -->
<div style="padding:20px; text-align:center;">
    <canvas id="salesChart" style="max-width:800px;"></canvas>
</div>

<!-- ランキング -->
<div style="padding:20px;">
    <h2>売上ランキング</h2>
    <ol>
        {% for p in ranking %}
        <li>{{ p.name }} - ¥{{ p.price * p.sold }}</li>
        {% endfor %}
    </ol>
</div>

<div class="container">
    {% for p in products %}
    <div class="card">

        {% if p.image %}
        <img src="/static/uploads/{{ p.image }}">
        {% else %}
        <img src="https://via.placeholder.com/200x150">
        {% endif %}

        <div class="card-body">
            <h3>{{ p.name }}</h3>
            <p>¥{{ p.price }}</p>
            <p>在庫: {{ p.stock }}</p>

            <a href="/sell/{{ loop.index0 }}" class="btn">売る</a>
            <a href="/delete/{{ loop.index0 }}" class="btn delete">削除</a>
        </div>

    </div>
    {% endfor %}
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const labels = JSON.parse('{{ names | tojson | safe }}');
const data = JSON.parse('{{ sales | tojson | safe }}');

const ctx = document.getElementById('salesChart');

let chart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: '販売数',
            data: data,
            backgroundColor: 'rgba(0, 123, 255, 0.7)',
            borderRadius: 8
        }]
    },
    options: {
        scales: {
            y: {
                beginAtZero: true,
                ticks: {
                    stepSize: 1
                }
            }
        }
    }
});

function updateStep(step) {
    chart.options.scales.y.ticks.stepSize = step;
    chart.update();
}
</script>

</body>
</html>
