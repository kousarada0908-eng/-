<h2>📊 ダッシュボード</h2>

<form action="/add" method="POST">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <button type="submit">追加</button>
</form>

<hr>

<h3>📈 日別売上</h3>

<!-- ★ 単位選択追加 -->
<select id="unitSelect">
    <option value="100">100円単位</option>
    <option value="1000">1000円単位</option>
    <option value="10000">10000円単位</option>
</select>

<canvas id="lineChart"></canvas>

<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

// =========================
// 📈 折れ線グラフ（強化版）
// =========================
let lineChart;

function createLineChart(unit) {

    // 単位変換
    const converted = dailySales.map(v => v / unit);

    // 最大値
    const maxValue = Math.max(...converted);

    // 👉 真ん中に来るよう調整
    const suggestedMax = maxValue * 2;

    // 既存グラフ削除
    if (lineChart) {
        lineChart.destroy();
    }

    lineChart = new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                label: `売上（${unit}円単位）`,
                data: converted,
                tension: 0.3
            }]
        },
        options: {
            responsive: true,
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: suggestedMax
                }
            }
        }
    });
}

// 初期表示（100円単位）
createLineChart(100);

// 単位変更
document.getElementById("unitSelect").addEventListener("change", function() {
    createLineChart(Number(this.value));
});


// =========================
// 🥧 円グラフ
// =========================

// 色自動生成（商品増えてもOK）
const colors = pieLabels.map((_, i) =>
    `hsl(${i * 60}, 70%, 60%)`
);

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: pieLabels,
        datasets: [{
            data: pieData,
            backgroundColor: colors
        }]
    }
});
</script>

<hr>

<h3>商品一覧</h3>

<table border="1">
<tr>
    <th>商品名</th>
    <th>単価</th>
    <th>在庫</th>
    <th>売れた数</th>
    <th>売上</th>
    <th>操作</th>
</tr>

{% for p in table_data %}
<tr>
    <td>{{ p.name }}</td>
    <td>{{ p.price }}</td>
    <td>{{ p.stock }}</td>
    <td>{{ p.sold }}</td>
    <td>{{ p.total }}</td>
    <td>
        <a href="/sell/{{ p.id }}">売る</a>
        <a href="/delete/{{ p.id }}">削除</a>
    </td>
</tr>
{% endfor %}

<tr>
    <td colspan="4"><b>合計売上</b></td>
    <td colspan="2"><b>{{ total_sum }}</b></td>
</tr>

</table>
