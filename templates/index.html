<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ダッシュボード</title>

<link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<h2 style="text-align:center;">売上ダッシュボード</h2>

<!-- 円グラフ -->
<canvas id="pieChart"></canvas>

<!-- 棒グラフ -->
<canvas id="barChart"></canvas>

<!-- 並び替え -->
<div style="margin:20px;">
    <button onclick="sortTable(0)">名前</button>
    <button onclick="sortTable(1)">単価</button>
    <button onclick="sortTable(2)">売れた数</button>
    <button onclick="sortTable(4)">売上</button>
</div>

<!-- 表 -->
<table id="productTable" border="1" style="width:100%; text-align:center;">
    <thead>
        <tr>
            <th>商品名</th>
            <th>単価</th>
            <th>売れた数</th>
            <th>在庫</th>
            <th>売上</th>
        </tr>
    </thead>

    <tbody>
        {% for p in table_data %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.price }}</td>
            <td>{{ p.sold }}</td>
            <td>{{ p.unsold }}</td>
            <td>{{ p.total }}</td>
        </tr>
        {% endfor %}
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4">総売上</td>
            <td>{{ total_sum }}</td>
        </tr>
    </tfoot>
</table>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const names = JSON.parse('{{ names | tojson | safe }}');
const sold = JSON.parse('{{ sold_data | tojson | safe }}');
const dates = JSON.parse('{{ dates | tojson | safe }}');
const daily = JSON.parse('{{ daily_sales | tojson | safe }}');

// 円グラフ
new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: names,
        datasets: [{
            data: sold
        }]
    }
});

// 棒グラフ
new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: {
        labels: dates,
        datasets: [{
            label: "日別売上",
            data: daily
        }]
    }
});
</script>


</body>
</html>
