<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: black;
}

.dark {
    --bg: #1e1e1e;
    --card: #2c2c2c;
    --text: white;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
}

/* ヘッダー */
.header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
    position: relative;
}

/* ログアウト */
.logout {
    position: absolute;
    right: 15px;
    top: 15px;
}

/* コンテナ */
.container {
    padding: 15px;
}

/* カード */
.card {
    background: var(--card);
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 15px;
}

/* ボタン */
button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 6px;
    background: #3498db;
    color: white;
}

/* テーブル */
table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: #333;
    color: white;
}

td, th {
    padding: 8px;
}

tr:nth-child(even) {
    background: #eee;
}

.dark tr:nth-child(even) {
    background: #444;
}

/* スマホ */
@media(max-width:600px){
    table, tr, td {
        display:block;
    }
}
</style>
</head>

<body>

<div class="header">
📊 ダッシュボード
<a href="/logout" class="logout">ログアウト</a>
</div>

<div class="container">

<!-- ダークモード -->
<button onclick="toggleDark()">🌙 ダークモード</button>

<!-- 追加 -->
<div class="card">
<form action="/add" method="POST">
<input name="name" placeholder="商品名">
<input name="price" placeholder="価格">
<input name="stock" placeholder="在庫">
<button>追加</button>
</form>
</div>

<!-- グラフ -->
<div class="card">
<h3>📈 売上</h3>

<button onclick="showTotal()">合計</button>
<button onclick="showProduct()">商品別</button>

<select id="unitSelect">
<option value="100">100円</option>
<option value="1000">1000円</option>
<option value="10000">10000円</option>
</select>

<select id="modeSelect" onchange="changeMode()">
<option value="day">日別</option>
<option value="week">週別</option>
<option value="month">月別</option>
</select>

<canvas id="lineChart"></canvas>
</div>

<!-- 円グラフ -->
<div class="card">
<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>
</div>

<!-- テーブル -->
<div class="card">
<h3>商品一覧</h3>

<button onclick="sortTable('total')">売上順</button>
<button onclick="sortTable('stock')">在庫順</button>

<table id="productTable">
<tr><th>商品名</th><th>単価</th><th>在庫</th><th>売上</th></tr>

{% for p in table_data %}
<tr class="data-row">
<td>{{ p.name }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td>{{ p.total }}</td>
</tr>
{% endfor %}
</table>
</div>

<!-- ランキング -->
<div class="card">
<h3>🏆 ランキング</h3>
<ol>
{% for r in ranking %}
<li>{{ r.name }} - {{ r.total }}円</li>
{% endfor %}
</ol>
</div>

</div>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const productDaily = {{ product_daily | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let chart;
let mode = "total";

// ダークモード
function toggleDark(){
    document.body.classList.toggle("dark");
}

// グラフ
function createChart(){
    if(chart) chart.destroy();

    chart = new Chart(lineChart, {
        type: "line",
        data: {
            labels: dates,
            datasets: [{
                label: "売上",
                data: dailySales,
                borderColor: "blue",
                fill: false
            }]
        },
        options: {
            animation: {
                duration: 1500
            }
        }
    });
}

createChart();

// 円グラフ
new Chart(pieChart,{
    type:"pie",
    data:{labels:pieLabels,datasets:[{data:pieData}]},
    options:{animation:{duration:1500}}
});

// 並び替え
function sortTable(type){
    const rows=[...document.querySelectorAll(".data-row")];
    const i = type==="stock"?2:3;

    rows.sort((a,b)=>b.children[i].innerText - a.children[i].innerText);
    rows.forEach(r=>productTable.appendChild(r));
}
</script>

</body>
</html>
