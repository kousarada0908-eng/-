<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ダッシュボード</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg: #f4f6f9;
    --card: white;
    --text: #1a1a1a;
    --main: #4f46e5;
    --sub: #06b6d4;
}

.dark {
    --bg: #0f172a;
    --card: #1e293b;
    --text: #e2e8f0;
}

body {
    margin: 0;
    background: linear-gradient(135deg, var(--bg), #e2e8f0);
    color: var(--text);
    font-family: sans-serif;
}

.page { display:none; }
.active { display:block; }

.kpi { display:flex; gap:10px; padding:10px; }
.kpi-card {
    flex:1;
    padding:15px;
    border-radius:10px;
    color:white;
}
.kpi-blue { background:#4f46e5; }
.kpi-green { background:#10b981; }

.card {
    background: var(--card);
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
}

.products {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:10px;
    padding:10px;
}

.product-card {
    background: var(--card);
    padding:10px;
    border-radius:10px;
}

.product-card img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
}

button, .btn {
    padding:8px 12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg,var(--main),var(--sub));
    color:white;
    cursor:pointer;
    margin-top:5px;
}

.delete { background:red; }

.bottom-nav {
    position:fixed;
    bottom:0;
    width:100%;
    background:#0f172a;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

.bottom-nav button {
    background:none;
    color:white;
    font-size:18px;
}

.toast {
    position:fixed;
    top:20px;
    right:20px;
    background:#333;
    color:white;
    padding:10px;
    border-radius:8px;
    display:none;
}

canvas {
    width:100% !important;
    height:300px !important;
}

@media(max-width:600px){
    .grid { grid-template-columns:1fr; }
    .kpi { flex-direction:column; }
}
</style>
</head>

<body>

<div id="toast" class="toast">売上登録しました！</div>

<button onclick="toggleDark()">🌙</button>

<!-- KPI -->
<div id="page1" class="page active">
<div class="kpi">
<div class="kpi-card kpi-blue">
<h3>総売上</h3>
<p>{{ total_sum }}円</p>
</div>

<div class="kpi-card kpi-green">
<h3>商品数</h3>
<p>{{ table_data|length }}</p>
</div>
</div>

<div class="grid">
<div class="card"><canvas id="lineChart"></canvas></div>
<div class="card"><canvas id="pieChart"></canvas></div>
</div>
</div>

<!-- 商品 -->
<div id="page2" class="page">

<div class="card">
<form action="/add" method="POST">
<input name="name" placeholder="商品名">
<input name="price" placeholder="価格">
<input name="stock" placeholder="在庫">
<input name="image" placeholder="画像URL">
<button>追加</button>
</form>

<label>
<input type="checkbox" id="notifyToggle" checked> 通知ON
</label>
</div>

<div class="products">
{% for p in table_data %}
<div class="product-card">

<img src="{{ p.image if p.image else 'https://via.placeholder.com/150' }}">

<h3>{{ p.name }}</h3>
<p>💰 {{ p.price }}円</p>
<p>📦 在庫 {{ p.stock }}</p>
<p>📈 売上 {{ p.total }}</p>

<button onclick="sellProduct({{ p.id }})">売る</button>
<a href="/delete/{{ p.id }}" class="btn delete">削除</a>

</div>
{% endfor %}
</div>

</div>

<div class="bottom-nav">
<button onclick="showPage(1)">📊</button>
<button onclick="showPage(2)">📦</button>
</div>

<script>
// =======================
// 🔥 データを1つにまとめる（重要）
// =======================
const dashboard = {
    dates: {{ dates | tojson }},
    dailySales: {{ daily_sales | tojson }},
    pieLabels: {{ pie_labels | tojson }},
    pieData: {{ pie_data | tojson }}
};

let chart;
let pieChart;

// ダークモード
function toggleDark(){
    document.body.classList.toggle("dark");
}

// ページ切り替え
function showPage(n){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById("page"+n).classList.add("active");
}

// グラデーション
function createGradient(ctx){
    let grad = ctx.createLinearGradient(0,0,0,300);
    grad.addColorStop(0,"rgba(79,70,229,0.5)");
    grad.addColorStop(1,"rgba(79,70,229,0)");
    return grad;
}

// 折れ線グラフ
function createLineChart(){
    const ctx = document.getElementById("lineChart").getContext("2d");

    chart = new Chart(ctx,{
        type:"line",
        data:{
            labels:dashboard.dates,
            datasets:[{
                data:dashboard.dailySales,
                borderColor:"#4f46e5",
                backgroundColor:createGradient(ctx),
                fill:true,
                tension:0.4
            }]
        }
    });
}

// 円グラフ
function createPieChart(){
    const ctx = document.getElementById("pieChart").getContext("2d");

    pieChart = new Chart(ctx,{
        type:"pie",
        data:{
            labels:dashboard.pieLabels,
            datasets:[{data:dashboard.pieData}]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false
        }
    });
}

createLineChart();
createPieChart();

// 売る処理
function sellProduct(id){
    fetch("/sell/"+id).then(()=>{
        if(document.getElementById("notifyToggle").checked){
            let t=document.getElementById("toast");
            t.style.display="block";
            setTimeout(()=>t.style.display="none",1500);
        }
        location.reload();
    });
}
</script>

</body>
</html>
