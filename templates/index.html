<h2>📊 ダッシュボード</h2>

<form action="/add" method="POST">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <button type="submit">追加</button>
</form>

<hr>

<h3>📈 売上グラフ</h3>

<button onclick="showTotal()">合計</button>
<button onclick="showProduct()">商品別</button>

<select id="unitSelect">
    <option value="100">100円</option>
    <option value="1000">1000円</option>
    <option value="10000">10000円</option>
</select>

<select id="modeSelect" onchange="changeMode()">
    <option value="day">日別</option>
    <option value="week">週別</option>
    <option value="month">月別</option>
</select>

<a href="/download">CSVダウンロード</a>

<canvas id="lineChart"></canvas>

<h3>🥧 売上構成</h3>
<canvas id="pieChart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
const dates = {{ dates | tojson }};
const dailySales = {{ daily_sales | tojson }};
const productDaily = {{ product_daily | tojson }};
const pieLabels = {{ pie_labels | tojson }};
const pieData = {{ pie_data | tojson }};

let lineChart;
let mode = "total";

function getColor(i) {
    return `hsl(${i * 60}, 70%, 50%)`;
}

function createChart(unit) {

    if (lineChart) lineChart.destroy();

    let datasets = [];
    let allValues = [];

    if (mode === "total") {
        const converted = dailySales.map(v => v / unit);
        allValues = converted;

        datasets.push({
            label: "合計",
            data: converted,
            borderColor: "blue",
            backgroundColor: "rgba(0,0,255,0.1)",
            fill: true,
            tension: 0.3
        });

    } else {
        Object.keys(productDaily).forEach((name, i) => {
            const converted = productDaily[name].map(v => v / unit);
            allValues = allValues.concat(converted);

            datasets.push({
                label: name,
                data: converted,
                borderColor: getColor(i),
                fill: false,
                tension: 0.3
            });
        });
    }

    const maxValue = Math.max(...allValues);
    const suggestedMax = maxValue * 2;

    lineChart = new Chart(document.getElementById("lineChart"), {
        type: "line",
        data: { labels: dates, datasets: datasets },
        options: {
            plugins: {
                tooltip: {
                    callbacks: {
                        label: (ctx) => ctx.raw * unit + "円"
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    suggestedMax: suggestedMax
                }
            }
        }
    });
}

function showTotal() {
    mode = "total";
    createChart(Number(document.getElementById("unitSelect").value));
}

function showProduct() {
    mode = "product";
    createChart(Number(document.getElementById("unitSelect").value));
}

document.getElementById("unitSelect").addEventListener("change", function() {
    createChart(Number(this.value));
});

function changeMode() {
    const m = document.getElementById("modeSelect").value;
    location.href = "/?mode=" + m;
}

createChart(100);

// 円グラフ
const colors = pieLabels.map((_, i) =>
    `hsl(${i * 60}, 70%, 60%)`
);

new Chart(document.getElementById("pieChart"), {
    type: "pie",
    data: {
        labels: pieLabels,
        datasets: [{
            data: pieData,
            backgroundColor: colors
        }]
    }
});

// 並び替え
function sortTable(type) {
    const table = document.getElementById("productTable");
    const rows = Array.from(table.getElementsByClassName("data-row"));

    let index = {stock:2, sold:3, total:4}[type];

    rows.sort((a, b) => {
        return Number(b.children[index].innerText) - Number(a.children[index].innerText);
    });

    rows.forEach(r => table.appendChild(r));
}
</script>

<style>
.data-row:nth-child(even){background:#f9f9f9;}
.data-row:hover{background:#ffeeba;}
button{margin:5px;padding:5px 10px;}
</style>

<hr>

<h3>商品一覧</h3>

<button onclick="sortTable('total')">売上順</button>
<button onclick="sortTable('stock')">在庫順</button>
<button onclick="sortTable('sold')">販売数順</button>

<table border="1" id="productTable">
<tr style="background:#333;color:white;">
<th>商品名</th><th>単価</th><th>在庫</th><th>売れた数</th><th>売上</th><th>操作</th>
</tr>

{% for p in table_data %}
<tr class="data-row">
<td>{{ p.name }}</td>
<td>{{ p.price }}</td>
<td>{{ p.stock }}</td>
<td>{{ p.sold }}</td>
<td>{{ p.total }}</td>
<td>
<a href="/sell/{{ p.id }}">売る</a>
<a href="/delete/{{ p.id }}">削除</a>
</td>
</tr>
{% endfor %}

<tr>
<td colspan="4"><b>合計売上</b></td>
<td colspan="2"><b>{{ total_sum }}</b></td>
</tr>
</table>

<h3>🏆 売上ランキング</h3>
<ol>
{% for r in ranking %}
<li>{{ r.name }} - {{ r.total }}円</li>
{% endfor %}
</ol>
