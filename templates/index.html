<h2>ダッシュボード</h2>

<p>合計売上: {{ total_sum }}</p>

<h3>商品一覧</h3>

<form action="/add" method="POST">
    <input name="name" placeholder="商品名">
    <input name="price" placeholder="価格">
    <input name="stock" placeholder="在庫">
    <button type="submit">追加</button>
</form>

<ul>
{% for p in table_data %}
    <li>
        {{ p.name }} / 売上: {{ p.total }} / 在庫: {{ p.unsold }}
        <a href="/sell/{{ loop.index }}">売る</a>
        <a href="/delete/{{ loop.index }}">削除</a>
    </li>
{% endfor %}
</ul>

<br>

<a href="/login">ログアウト（ログイン画面へ）</a>
